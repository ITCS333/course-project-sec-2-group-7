<!--
  Requirement: Create a Responsive Admin Portal

  Instructions:
  Fill in the HTML elements as described in the comments.
  Use the provided IDs for the elements that require them.
  Focus on creating a clear and semantic HTML structure.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Add the meta tag for character encoding. -->
    <meta charset="UTF-8">

    <!-- Add the responsive viewport meta tag. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Add a title for the page. -->
    <title>Admin Portal</title>

    <!-- Link to a CSS file. -->
    <link rel="stylesheet" href="../common/styles.css">

    <!-- Add a script tag that loads manage_users.js with defer. -->
    <script src="manage_users.js" defer></script>
</head>
<body>

    <!-- Create a header element for the top of the page. -->
    <header>
        <!-- Inside the header, add a main heading. -->
        <h1>Admin Portal</h1>
    </header>

    <!-- Create a main element to hold the primary content of the portal. -->
    <main class="admin-page">

        <!-- Section 1: Password Management -->
        <!-- Create a section for the password management functionality. -->
        <section class="admin-section">
            <!-- Add a sub-heading. -->
            <h2>Change Your Password</h2>

            <!-- Create a form for changing the password. -->
            <form action="#" id="password-form">
                <!-- Use a fieldset to group the password-related fields. -->
                <fieldset>
                    <!-- Add a legend for the fieldset. -->
                    <legend>Password Update</legend>

                    <!-- Add a label for the current password input. -->
                    <label for="current-password">Current Password</label>

                    <!-- Add an input for the current password. -->
                    <input type="password" id="current-password" required>

                    <!-- Add a label for the new password input. -->
                    <label for="new-password">New Password</label>

                    <!-- Add an input for the new password. -->
                    <input type="password" id="new-password" minlength="8" required>

                    <!-- Add a label for the confirm password input. -->
                    <label for="confirm-password">Confirm Password</label>

                    <!-- Add an input to confirm the new password. -->
                    <input type="password" id="confirm-password" required>

                    <!-- Add a button to submit the form. -->
                    <button type="submit" id="change">Update Password</button>
                </fieldset>
            </form>
        </section>

        <!-- Section 2: User Management -->
        <!-- Create another section for the user management functionality. -->
        <section class="admin-section">
            <!-- Add a sub-heading. -->
            <h2>Manage Users</h2>

            <!-- Subsection 2.1: Add New User Form -->
            <!-- Create a details element so the Add User form can be collapsed. -->
            <details>
                <!-- Add a summary element inside details. -->
                <summary>Add New User</summary>

                <!-- Create a form for adding a new user. -->
                <form action="#" id="add-user-form">
                    <!-- Use a fieldset to group the new user fields. -->
                    <fieldset>
                        <!-- Add a legend for the fieldset. -->
                        <legend>New User Information</legend>

                        <!-- Add a label and input for the user's full name. -->
                        <label for="user-name">Full Name</label>
                        <input type="text" id="user-name" required>

                        <!-- Add a label and input for the user's email. -->
                        <label for="user-email">Email</label>
                        <input type="email" id="user-email" required>

                        <!-- Add a label and input for the default password. -->
                        <label for="default-password">Default Password</label>
                        <input type="password" id="default-password" required minlength="8">

                        <!-- Add a label and select for the admin status. -->
                        <label for="is-admin">User Role</label>
                        <select id="is-admin">
                            <option value="0">Student</option>
                            <option value="1">Admin</option>
                        </select>

                        <!-- Add a button to submit the form. -->
                        <button type="submit" id="add">Add User</button>
                    </fieldset>
                </form>
            </details>

            <!-- Subsection 2.2: User List -->
            <!-- Add a sub-heading for the list of users. -->
            <h3>Registered Users</h3>

            <!-- Add a search input field. -->
            <input type="text" id="search-input" placeholder="Search by name or email...">

            <!-- Create a table to display the list of users. -->
            <table id="user-table">
                <!-- Create a thead for the table headers. -->
                <thead>
                    <!-- Create a table row inside the thead. -->
                    <tr>
                        <!-- Create clickable table headers for sorting. -->
                        <th>Name</th>
                        <th>Email</th>
                        <th>Admin</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <!-- Create a tbody for the table body. -->
                <tbody id="user-table-body"></tbody>
            </table>
        </section>

    </main>

</body>
</html>
